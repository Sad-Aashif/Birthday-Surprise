<!DOCTYPE html>
<html>
<head>
<title>For My Bachcha 🫀✨</title>

<style>

body{
margin:0;
font-family:Segoe UI, sans-serif;
background:#0b0014;
color:white;
text-align:center;
overflow:hidden;
}

/* floating hearts */

.bg-hearts{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

.bg-hearts span{
position:absolute;
font-size:22px;
color:#d580ff;
animation:float 10s linear infinite;
opacity:0.6;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

/* login screen */

#login{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

input{
padding:12px;
border-radius:10px;
border:none;
font-size:16px;
}

button{
padding:12px 22px;
border:none;
border-radius:10px;
background:#a64dff;
color:white;
font-size:16px;
cursor:pointer;
}

/* main page */

#main{
display:none;
flex-direction:column;
height:100vh;
width:100%;
animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
0%{opacity:0;transform:translateY(20px);}
100%{opacity:1;transform:translateY(0);}
}

/* section */

.section{
height:100vh;
width:100%;
background-size:contain;
background-position:center;
background-repeat:no-repeat;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

/* backgrounds */

.ghost{
background-image:url("ghost.png");
}

.love{
background-image:url("love.png");
}

/* bouncing heart */

.heart{
font-size:60px;
color:#d580ff;
animation:bounce 1.8s ease-in-out infinite;
}

@keyframes bounce{
0%{transform:translateY(0);}
50%{transform:translateY(-50px);}
100%{transform:translateY(0);}
}

/* glowing text */

.title{
font-size:40px;
color:#f5ccff;
text-shadow:0 0 20px #c266ff;
}

</style>
</head>

<body>

<!-- floating hearts -->

<div class="bg-hearts">
<span style="left:10%">💜</span>
<span style="left:25%">💗</span>
<span style="left:40%">💜</span>
<span style="left:60%">💗</span>
<span style="left:75%">💜</span>
<span style="left:90%">💗</span>
</div>

<!-- LOGIN -->

<div id="login">

<h2>🔐 For My Bachcha 💜</h2>
<p>Enter the password</p>

<input type="password" id="pass">

<br><br>

<button onclick="check()">Unlock</button>

</div>

<!-- MAIN PAGE -->

<div id="main">

<div class="section ghost">

<h1 class="title">Happy Birthday My Love 💜🎂</h1>

<div class="heart">💜</div>

</div>

<div class="section love">

<h1 class="title">Happy Birthday</h1>
<h2 class="title">My Love ❤️</h2>
<h2 class="title">My Life 💖</h2>

</div>

</div>

<script>

function check(){

let p=document.getElementById("pass").value;

if(p==="10032007"){

document.getElementById("login").style.display="none";
document.getElementById("main").style.display="flex";

}
else{

alert("Wrong password 😜");

}

}

</script>

</body>
</html>
