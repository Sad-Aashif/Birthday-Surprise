<!DOCTYPE html>
<html>
<head>

<title>For My Bachcha</title>

<style>

body{
background:#0f172a;
color:white;
font-family:sans-serif;
text-align:center;
margin:0;
padding-top:100px;
}

#main{
display:none;
}

input{
padding:10px;
border-radius:8px;
border:none;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
background:#ff4d6d;
color:white;
cursor:pointer;
}

.scene{
position:relative;
margin-top:40px;
}

.couple{
width:420px;
}

.heart{
position:absolute;
top:48%;
left:50%;
transform:translate(-50%,-50%);
font-size:40px;
animation:spin 2s linear infinite;
}

@keyframes spin{

0%{
transform:translate(-50%,-50%) rotate(0deg);
}

100%{
transform:translate(-50%,-50%) rotate(360deg);
}

}

</style>

</head>

<body>

<div id="login">

<h2>🔐 For My Bachcha</h2>
<p>Enter the password</p>

<input type="password" id="pass">

<br><br>

<button onclick="check()">Unlock</button>

</div>


<div id="main">

<h1>Happy Birthday Bachcha 🥰🎂🎊</h1>

<p style="font-size:20px">

सुना है आज जन्मदिन हे तुम्हारा,<br>
अगर तुम अपनाओ, तो तोहफे में तुम्हें,<br>
मैं खुद को सौंप दूं 😚😘

</p>


<div class="scene">

<img src="couple.png" class="couple">

<div class="heart">❤️</div>

</div>

</div>


<script>

function check(){

let p=document.getElementById("pass").value;

if(p==="10032007"){

document.getElementById("login").style.display="none";
document.getElementById("main").style.display="block";

}
else{

alert("Wrong password 😜");

}

}

</script>

</body>
</html>
