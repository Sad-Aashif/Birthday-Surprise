<!DOCTYPE html>
<html>
<head>
<title>For My Bachcha 🫀✨</title>

<style>

body{
margin:0;
font-family:Segoe UI, sans-serif;
background:#000;
color:white;
text-align:center;
overflow:hidden;
}

/* floating hearts */

.bg-hearts{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

.bg-hearts span{
position:absolute;
color:#ff1a1a;
font-size:22px;
animation:float 10s linear infinite;
opacity:0.6;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

/* login screen */

#login{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

input{
padding:12px;
border-radius:10px;
border:none;
font-size:16px;
}

button{
padding:12px 22px;
border:none;
border-radius:10px;
background:#ff1a1a;
color:white;
font-size:16px;
cursor:pointer;
}

/* main page */

#main{
display:none;
height:100vh;
width:100%;
background:url("ghost.png") center center / contain no-repeat;
background-color:#000;
flex-direction:column;
align-items:center;
justify-content:center;
animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
0%{opacity:0;transform:translateY(20px);}
100%{opacity:1;transform:translateY(0);}
}

/* title */

.title{
font-size:42px;
color:#ff4d4d;
text-shadow:0 0 25px #ff0000;
margin-bottom:20px;
}

/* bouncing heart */

.heart{
font-size:60px;
color:#ff0000;
animation:bounce 1.8s ease-in-out infinite;
}

@keyframes bounce{
0%{transform:translateY(0);}
50%{transform:translateY(-40px);}
100%{transform:translateY(0);}
}

</style>
</head>

<body>

<!-- floating hearts -->

<div class="bg-hearts">
<span style="left:10%">❤️</span>
<span style="left:25%">❤️</span>
<span style="left:40%">❤️</span>
<span style="left:60%">❤️</span>
<span style="left:75%">❤️</span>
<span style="left:90%">❤️</span>
</div>

<!-- login page -->

<div id="login">

<h2>🔐 For My Mussu 🥰🤍</h2>
<p>Enter the password</p>

<input type="password" id="pass">

<br><br>

<button onclick="check()">Unlock</button>

</div>

<!-- main page -->

<div id="main">

<h1 class="title">Happy Birthday My Love ❤️🎂😘🎊</h1>

<div class="heart">❤️</div>

</div>

<script>

function check(){

let p=document.getElementById("pass").value;

if(p==="10032007"){

document.getElementById("login").style.display="none";
document.getElementById("main").style.display="flex";

}
else{

alert("Wrong password 😜");

}

}

</script>

</body>
</html>
