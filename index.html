<!DOCTYPE html>
<html>
<head>

<title>For My Bachcha</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#0f172a;
color:white;
text-align:center;
overflow:hidden;
}

/* login */

#login{
margin-top:120px;
}

input{
padding:10px;
border-radius:8px;
border:none;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
background:#ff4d6d;
color:white;
cursor:pointer;
}

/* main */

#main{
display:none;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
padding-top:60px;
}

/* couple container */

.couple{
margin-top:120px;
display:flex;
align-items:center;
justify-content:center;
gap:120px;
}

/* characters */

.person{
width:70px;
height:140px;
background:#ff6fa5;
border-radius:40px;
position:relative;
animation:sway 3s ease-in-out infinite;
}

.person.boy{
background:#4da6ff;
}

/* head */

.person::before{
content:"";
position:absolute;
top:-45px;
left:15px;
width:40px;
height:40px;
background:#ffd6b3;
border-radius:50%;
}

/* bounce heart */

.heart{
font-size:50px;
animation:bounce 1.6s ease-in-out infinite;
}

/* animations */

@keyframes bounce{

0%{transform:translateY(0);}
50%{transform:translateY(-50px);}
100%{transform:translateY(0);}

}

@keyframes sway{

0%{transform:rotate(-4deg);}
50%{transform:rotate(4deg);}
100%{transform:rotate(-4deg);}

}

</style>

</head>

<body>

<div id="login">

<h2>🔐 For My Bachcha🫀✨</h2>

<p>Enter the password</p>

<input type="password" id="pass">

<br><br>

<button onclick="check()">Unlock</button>

</div>


<div id="main">

<h1>Happy Birthday Mussu 🥰🎂🎊</h1>

<p style="font-size:20px">

सुना है आज जन्मदिन हे तुम्हारा,<br>
अगर तुम अपनाओ तो तोहफे में तुम्हें,<br>
मैं खुद को सौंप दूं 😚😘

</p>


<div class="couple">

<div class="person"></div>

<div class="heart">❤️</div>

<div class="person boy"></div>

</div>

</div>


<script>

function check(){

let p=document.getElementById("pass").value;

if(p==="10032007"){

document.getElementById("login").style.display="none";
document.getElementById("main").style.display="flex";

}
else{

alert("Wrong password 😜");

}

}

</script>

</body>
</html>
