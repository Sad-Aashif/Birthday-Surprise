<!DOCTYPE html>
<html>
<head>

<title>For My Bachcha</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:black;
color:white;
text-align:center;
}

/* login page */

#login{
margin-top:120px;
}

input{
padding:10px;
border-radius:8px;
border:none;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
background:#ff4d6d;
color:white;
cursor:pointer;
}

/* main page */

#main{
display:none;
height:100vh;
background:url("couple.png") center center / contain no-repeat;
display:flex;
flex-direction:column;
justify-content:flex-start;
align-items:center;
padding-top:60px;
}

/* heart */

.heart{
font-size:60px;
margin-top:180px;
animation:float 2s ease-in-out infinite;
}

/* heart animation */

@keyframes float{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-20px);
}

100%{
transform:translateY(0);
}

}

</style>

</head>

<body>

<div id="login">

<h2>🔐 For My Bachcha</h2>

<p>Enter the password</p>

<input type="password" id="pass">

<br><br>

<button onclick="check()">Unlock</button>

</div>


<div id="main">

<h1>Happy Birthday Bachcha 🥰🎂🎊</h1>

<p style="font-size:20px">

सुना है आज जन्मदिन हे तुम्हारा,<br>
अगर तुम अपनाओ तो तोहफे में तुम्हें,<br>
मैं खुद को सौंप दूं 😚😘

</p>

<div class="heart">❤️</div>

</div>


<script>

function check(){

let p=document.getElementById("pass").value;

if(p==="10/03/2007"){

document.getElementById("login").style.display="none";
document.getElementById("main").style.display="flex";

}
else{

alert("Wrong password 😜");

}

}

</script>

</body>
</html>
