<!DOCTYPE html>
<html>
<head>
<title>For My Bachcha🫀✨</title>

<style>

body{
margin:0;
font-family:Segoe UI, sans-serif;
background:linear-gradient(135deg,#ff6a88,#ff99ac,#ffc3a0);
height:100vh;
color:white;
text-align:center;
overflow:hidden;
}

/* floating hearts background */

.bg-hearts{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

.bg-hearts span{
position:absolute;
font-size:20px;
animation:float 8s linear infinite;
opacity:0.6;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:0;}
100%{transform:translateY(-10vh);opacity:1;}
}

/* login */

#login{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

/* inputs */

input{
padding:12px;
border-radius:10px;
border:none;
font-size:16px;
}

button{
padding:12px 22px;
border:none;
border-radius:10px;
background:#ff4d6d;
color:white;
font-size:16px;
cursor:pointer;
}

/* MAIN PAGE */

#main{
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
0%{opacity:0;transform:translateY(20px);}
100%{opacity:1;transform:translateY(0);}
}

/* couple */

.couple{
display:flex;
align-items:center;
gap:80px;
margin-top:90px;
}

/* characters */

.person{
width:70px;
height:140px;
border-radius:40px;
position:relative;
animation:sway 3s ease-in-out infinite;
}

.girl{background:#ff6fa5;}
.boy{background:#4da6ff;}

.person::before{
content:"";
position:absolute;
top:-45px;
left:15px;
width:40px;
height:40px;
background:#ffe0bd;
border-radius:50%;
}

/* heart bounce */

.heart{
font-size:60px;
animation:bounce 1.8s ease-in-out infinite;
}

@keyframes bounce{
0%{transform:translateY(0);}
50%{transform:translateY(-50px);}
100%{transform:translateY(0);}
}

/* sway animation */

@keyframes sway{
0%{transform:rotate(-4deg);}
50%{transform:rotate(4deg);}
100%{transform:rotate(-4deg);}
}

</style>
</head>

<body>

<!-- background hearts -->

<div class="bg-hearts">
<span style="left:10%">💗</span>
<span style="left:25%">🤍</span>
<span style="left:40%">💞</span>
<span style="left:60%">♥️</span>
<span style="left:75%">💓</span>
<span style="left:90%">💝</span>
</div>


<!-- LOGIN PAGE -->

<div id="login">

<h2>🔐 For My Bachcha 💖</h2>
<p>Enter the password</p>

<input type="password" id="pass">

<br><br>

<button onclick="check()">Unlock</button>

</div>


<!-- MAIN PAGE -->

<div id="main">

<h1>Happy Birthday Mussu 🥰🎂🎊</h1>

<p style="font-size:20px">

सुना है आज जन्मदिन हे तुम्हारा,<br>
अगर तुम मुझे अपनाओ , तो तोहफे में तुम्हें,<br>
मैं खुद को सौंप दूं 😚😘

</p>

<div class="couple">

<div class="person girl"></div>

<div class="heart">💖</div>

<div class="person boy"></div>

</div>

</div>


<script>

function check(){

let p=document.getElementById("pass").value;

if(p==="10032007"){

document.getElementById("login").style.display="none";
document.getElementById("main").style.display="flex";

}
else{

alert("Wrong password 😜");

}

}

</script>

</body>
</html>
